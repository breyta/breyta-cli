name: Release

on:
  push:
    tags:
      - "v[0-9][0-9][0-9][0-9].[0-9]*.[0-9]*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # Keep the release itself attributed to GitHub Actions. The PAT is only
          # used by GoReleaser for the cross-repository Homebrew tap publish.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}

      - name: Publish Go module compatibility tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git config user.name "breyta-ci"
          git config user.email "github-actions@breyta.ai"
          module_tag="$(./scripts/release-go-module-tag.sh "${RELEASE_TAG}")"
          git push origin "${module_tag}"
